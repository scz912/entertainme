<!DOCTYPE html>
<html>
<head>
<title>EntertainMe Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card text center">
            <div class="logo-icon" id="auth-logo">🔑</div>
            <div class="logo-text" id="auth-text">EntertainMe</div>
            <div style="text-align: center;">
                <h4>Reset Password</h4>
            </div>
            <form>
                <div class="text-start mb-1 small opacity-50">New Password</div>
                <div class="input-group-custom" style="margin-bottom: 0;">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="passwordInput" placeholder="Enter new password">
                    <i class="bi bi-eye" id="togglePassword" style="color: white; opacity: 0.5; cursor: pointer;"></i>
                </div>
                <p class="text-white-50 small" style="opacity: 0.6;">Must be at least 8 characters long</p>
                <div class="text-start mb-1 small opacity-50">Confirm New Password</div>
                <div class="input-group-custom">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="confirmPasswordInput" placeholder="Confirm new password">
                    <i class="bi bi-eye" id="toggleConfirmPassword" style="color: white; opacity: 0.5; cursor: pointer;"></i>
                </div>
            </form>
            <button type="submit" class="btn-auth w-100 mt-4">Reset Password</button>
            <br>
        </div>
    </div>
        <script>
        function setupPasswordToggle(toggleId, inputId) {
            const toggleElement = document.querySelector(toggleId);
            const inputElement = document.querySelector(inputId);

            toggleElement.addEventListener('click', function () {
                // Toggle the type attribute
                const type = inputElement.getAttribute('type') === 'password' ? 'text' : 'password';
                inputElement.setAttribute('type', type);
                
                // Toggle the eye icon classes
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
                
                // Toggle the opacity
                this.style.opacity = type === 'text' ? '1' : '0.5';
            });
        }
        setupPasswordToggle('#togglePassword', '#passwordInput');
        setupPasswordToggle('#toggleConfirmPassword', '#confirmPasswordInput');
    </script>
</body>
</html>
