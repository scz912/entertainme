<!DOCTYPE html>
<html>
<head>
<title>EntertainMe Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card text center">
            <div class="logo-icon" id="auth-logo">🎬</div>
            <div class="logo-text" id="auth-text">EntertainMe</div>
            <div style="text-align: center;">
                <h4>Forgot Password?</h4>
            </div>
            <form>
                <div class="text-start mb-1 small opacity-50">Email</div>
                <div class="input-group-custom">
                    <i class="bi bi-envelope"></i>
                    <input type="email" placeholder="Enter registered email">
                </div>
            <button type="submit" class="btn-auth w-100 mt-4">Continue</button><br>
            <a href="login.html" class="direct-link"><i class="bi bi-arrow-left"></i> Back to login</a>
        </div>
    </div>
    
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#passwordInput');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
            
            this.style.opacity = type === 'text' ? '1' : '0.5';
        });
    </script>
</body>
</html>
