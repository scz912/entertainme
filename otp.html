<!DOCTYPE html>
<html>
<head>
    <title>EntertainMe OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        .otp-box {
        width: 50px;
        height: 55px;

        text-align: center;
        font-size: 20px;
        color: white;

        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;

        outline: none;
        box-shadow: none !important;
        transition: all 0.3s ease;
        }
        .otp-box:focus-within {
        border-color: #ff4df0;
        box-shadow: 0 0 15px rgba(255, 77, 240, 0.4);
        background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
    <body>
        <div class="auth-container">
        <div class="auth-card text center">
            <div class="logo-icon" id="auth-logo">🎬</div>
            <div class="logo-text" id="auth-text">EntertainMe</div>
            <div style="text-align: center;">
                <h4>Enter Verification Code</h4>
                <p class="text-white-50" style="opacity: 0.8;">We sent a 6-digit code to your email</p>
            </div>
            <div class="d-flex gap-2">
                <input type="text" maxlength="1" class="otp-box text-center">
                <input type="text" maxlength="1" class="otp-box text-center">
                <input type="text" maxlength="1" class="otp-box text-center">
                <input type="text" maxlength="1" class="otp-box text-center">
                <input type="text" maxlength="1" class="otp-box text-center">
                <input type="text" maxlength="1" class="otp-box text-center">
            </div>
            
            <button type="submit" class="btn-auth w-100 mt-4">Verify Code</button>
            <div style="text-align: center; margin: 15px 0; opacity: 0.5; font-size: 12px; line-height: 1.5;">
                Didn't receive the code?
                <a href="#" id="resendBtn" class="direct-link">Resend</a>
            </div>
        </div>
        </div>
        <script>
            const inputs = document.querySelectorAll(".otp-box");

            inputs.forEach((input, index) => {
                input.addEventListener("input", () => {
                    // Allow only numbers
                    input.value = input.value.replace(/[^0-9]/g, '');

                    // Move to next input
                    if (input.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                // Handle backspace (go to previous)
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace" && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        </script>
    </body>
</html>
