<!DOCTYPE html>
<html>

<head>
    <title>EntertainMe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">EntertainMe</span>
            </a>

            <!-- MENU -->
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link active" href="home.html">
                            <i class="bi bi-house"></i>
                            <span>Home</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="search.html">
                            <i class="bi bi-search"></i>
                            <span>Search</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="watchlist.html">
                            <i class="bi bi-bookmark"></i>
                            <span>Watchlist</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                    </li>

                </ul>
            </div>

            <!-- LOGOUT -->
            <button class="btn btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>

        </div>
    </nav>
       <div class="container mt-5 mb-5">
        <div class="col-lg-10 mx-auto">
            <!-- Back Button -->
            <div class="back-btn mb-4">
                <button onclick="history.back()"
                    class="d-inline-flex align-items-center gap-2 custom-back-btn">
                    <i class="bi bi-arrow-left"></i>
                    <span>Back</span>
                </button>
            </div>

            <!-- Item Details -->
            <div id="item-details" class="row mb-4 review-glass-card p-4 mx-0">
                <!-- Populated by JS -->
            </div>

            <!-- Review Form via Star Rating -->
            <div class="review-glass-card p-4 mb-4">
                <h4 class="mb-4 fw-bold">Write Your Review</h4>
                <form id="review-form">
                    <div class="mb-3">
                        <label class="form-label text-light fw-medium">Your Rating</label>
                        <div class="review-star-rating-input d-flex gap-2" id="review-star-input">
                            <i class="bi bi-star" data-rating="1"></i>
                            <i class="bi bi-star" data-rating="2"></i>
                            <i class="bi bi-star" data-rating="3"></i>
                            <i class="bi bi-star" data-rating="4"></i>
                            <i class="bi bi-star" data-rating="5"></i>
                        </div>
                        <input type="hidden" id="rating-value" value="0" required>
                    </div>
                 <!-- Review textarea -->

                    <div class="mb-4">
                        <label for="review-text" class="form-label text-light fw-medium">Your Review</label>
                        <textarea class="form-control review-textarea" id="review-text" rows="4"
                            placeholder="Share your thoughts about this..." required></textarea>
                    </div>
                <!--Submit Review Button-->

                    <button type="submit" class="btn review-submit-btn w-100">
                        <i class="bi bi-send-arrow-up"></i> Submit Review</button>
                </form>
            </div>

            <!-- Existing Reviews -->
            <div class="review-glass-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Reviews</h4>
                    <div id="average-rating-display" class="d-flex align-items-center gap-2">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div id="reviews-list" class="d-flex flex-column gap-3">
                    <!-- Empty placeholder for reviews -->
                </div>
            </div>
        </div>
    </div>


    <script src="js/main.js"></script>
</body>

</html>
