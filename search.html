<!DOCTYPE html>
<html>

<head>
    <title>EntertainMe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">EntertainMe</span>
            </a>

            <!-- MENU -->
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="home.html">
                            <i class="bi bi-house"></i>
                            <span>Home</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="search.html">
                            <i class="bi bi-search"></i>
                            <span>Search</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="watchlist.html">
                            <i class="bi bi-bookmark"></i>
                            <span>Watchlist</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                    </li>

                </ul>
            </div>

            <!-- LOGOUT -->
            <button class="btn btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>

        </div>
    </nav>
    <!-- MAIN CONTENT -->
    <div class="container py-4">

        <!-- TITLE -->
        <h2 class="fw-bold mb-4">Search Entertainment</h2>

        <!-- SEARCH BAR -->
        <div class="search-box mb-4">
            <i class="bi bi-search"></i>
            <input id="searchInput" type="text" placeholder="Search for movies, music, books...">
        </div>

        <!-- FILTERS -->
        <div class="filter-box mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5><i class="bi bi-funnel text-pink"></i> Filters</h5>
                <span id="clearBtn" class="clear-btn">Clear All</span>
            </div>

            <div class="row g-3">
                <div class="col-md-3">
                    <select id="typeFilter" class="form-select custom-select">
                        <option value="all">All Types</option>
                        <option value="movie">Movies</option>
                        <option value="music">Music</option>
                        <option value="book">Books</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="genreFilter" class="form-select custom-select">
                        <option value="all">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Classic">Classic</option>
                        <option value="Rock">Rock</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="yearFilter" class="form-select custom-select">
                        <option value="all">All Years</option>
                        <option value="2022">2022</option>
                        <option value="2012">2012</option>
                        <option value="1969">1969</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="ratingFilter" class="form-select custom-select">
                        <option value="all">Any Rating</option>
                        <option value="4.5">4.5+</option>
                        <option value="4.0">4.0+</option>
                        <option value="3.0">3.0+</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- RESULTS -->
        <h5 id="resultCount" class="mb-3">0 Results</h5>

        <div id="results" class="row g-4"></div>



    </div>

    <script src="js/search.js"></script>
</body>

</html>
