<!DOCTYPE html>
<html>

<head>
    <title>EntertainMe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">EntertainMe</span>
            </a>

            <!-- MENU -->
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="home.html">
                            <i class="bi bi-house"></i>
                            <span>Home</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="search.html">
                            <i class="bi bi-search"></i>
                            <span>Search</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="watchlist.html">
                            <i class="bi bi-bookmark"></i>
                            <span>Watchlist</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                    </li>

                </ul>
            </div>

            <!-- LOGOUT -->
            <button class="btn btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>

        </div>
    </nav>
    <!-- MAIN CONTENT -->
    <div class="container py-4">

        <!-- TITLE -->
        <h2 class="fw-bold mb-4">Search Entertainment</h2>

        <!-- SEARCH BAR -->
        <div class="search-box mb-4">
            <i class="bi bi-search"></i>
            <input id="searchInput" type="text" placeholder="Search for movies, music, books...">
        </div>

        <!-- FILTERS -->
        <div class="filter-box mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5><i class="bi bi-funnel text-pink"></i> Filters</h5>
                <span id="clearBtn" class="clear-btn">Clear All</span>
            </div>

            <div class="row g-3">
                <div class="col-md-3">
                    <select id="typeFilter" class="form-select custom-select">
                        <option value="all">All Types</option>
                        <option value="movie">Movies</option>
                        <option value="music">Music</option>
                        <option value="book">Books</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="genreFilter" class="form-select custom-select">
                        <option value="all">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Classic">Classic</option>
                        <option value="Rock">Rock</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="yearFilter" class="form-select custom-select">
                        <option value="all">All Years</option>
                        <option value="2022">2022</option>
                        <option value="2012">2012</option>
                        <option value="1969">1969</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="ratingFilter" class="form-select custom-select">
                        <option value="all">Any Rating</option>
                        <option value="4.5">4.5+</option>
                        <option value="4.0">4.0+</option>
                        <option value="3.0">3.0+</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- RESULTS -->
        <h5 id="resultCount" class="mb-3">0 Results</h5>

        <div id="results" class="row g-4"></div>



    </div>

    <script src="js/search.js"></script>
    <style>
        /* SEARCH BAR */
        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            height: 55px;
            padding-left: 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        /* FILTER BOX */
        .filter-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .custom-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            appearance: auto;
        }

        .clear-btn {
            color: #ff4df0;
            cursor: pointer;
        }

        /* CARDS */
        .custom-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 450px;
        }

        .custom-card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            height: 350px;
            object-fit: cover;
        }

        /* BADGE */
        .badge-type {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #a855f7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* BOOKMARK ICON */
        .bookmark-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            color: #9ca3af;
            z-index: 2;
        }

        .bookmark-icon:hover {
            transform: scale(1.1);
        }

        .active-bookmark {
            color: #ff4df0 !important;
        }

        /* CARD BODY */
        .card-body {
            padding: 20px;
            margin-top: auto;
        }

        .rating {
            color: gold;
        }

        .rating i {
            color: #6b7280;
        }

        .rating .filled {
            color: #facc15;
        }

        .view-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 1;
        }

        .custom-card:hover .view-overlay {
            opacity: 1;
        }

        .view-overlay button {
            background: linear-gradient(to right, #ff4df0, #8b5cf6);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }
    </style>
</body>

</html>
